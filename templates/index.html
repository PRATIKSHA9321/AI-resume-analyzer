<!DOCTYPE html>

<html>
<head>
    <title>AI Resume Analyzer</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
    }
    .card {
        border-radius: 20px;
        backdrop-filter: blur(10px);
    }
    .title {
        font-weight: bold;
        color: #333;
    }
</style>
```

</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

```
<div class="card p-5 shadow-lg col-md-6 bg-white">

    <h2 class="text-center mb-4">🤖 AI Resume Analyzer</h2>

    <form action="/analyze" method="post" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Upload Resume</label>
            <input type="file" class="form-control" name="resume" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Job Description</label>
            <textarea class="form-control" name="job_description" rows="5"
            placeholder="Paste job description here..."></textarea>
        </div>

        <button class="btn btn-dark w-100">🚀 Analyze Now</button>

    </form>

</div>
```

</div>

</body>
</html>
